<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Колесо удачи</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eeeeee;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.wheel {
  width: 300px;
  height: 300px;
  margin: 40px auto;
  border-radius: 50%;
  border: 8px solid white;
  transition: transform 4s ease-out;
  background: conic-gradient(
    #f3e5dc 0deg 60deg,
    #d8c6be 60deg 120deg,
    #c8d5e0 120deg 180deg,
    #c7dcd5 180deg 240deg,
    #f1e3c6 240deg 300deg,
    #e6d0cc 300deg 360deg
  );
}

.pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid #333;
  margin: 0 auto;
}

.spin-btn {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#f7e7c6,#e5c98f);
  font-size: 16px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🎡 Крути колесо</h1>
<div class="pointer"></div>
<div id="wheel" class="wheel"></div>

<button id="spinBtn" class="spin-btn" onclick="spin()">Крутить</button>

<div id="result" class="result"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

let spinning = false;

const prizes = [
  "Скидка 5%",
  "Скидка 10%",
  "Бесплатная доставка",
  "Подарок",
  "Мини-набор",
  "Главный приз"
];

async function spin() {
  if (spinning) return;

  spinning = true;

  const wheel = document.getElementById("wheel");
  const result = document.getElementById("result");
  const button = document.getElementById("spinBtn");

  result.innerText = "Крутим...";
  button.disabled = true;

  try {
    const userId = tg?.initDataUnsafe?.user?.id || "test-user";

    const response = await fetch("https://nathan-design-local-routines.trycloudflare.com/spin", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId })
    });

    const data = await response.json();

    const prizeIndex = prizes.indexOf(data.prize);
    const safeIndex = prizeIndex >= 0 ? prizeIndex : 0;

    const angle = 360 * 5 + safeIndex * 60 + 30;
    wheel.style.transform = `rotate(-${angle}deg)`;

    setTimeout(() => {
      if (data.already) {
        result.innerText = "Вы уже крутили: " + data.prize;
      } else {
        result.innerText = "🎁 Ваш приз: " + data.prize;
      }

      spinning = false;
      button.disabled = false;
    }, 4200);

  } catch (e) {
    result.innerText = "Ошибка подключения к серверу";
    spinning = false;
    button.disabled = false;
  }
}
</script>

</body>
</html>
