<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колесо удачи</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eeeeee; /* 👈 НОВЫЙ ФОН */
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 10px;
    }

    .wheel {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 8px solid #ffffff;
      position: relative;
      transition: transform 4s ease-out;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      background: conic-gradient(
        #FADADD 0deg 60deg,
        #D6E4FF 60deg 120deg,
        #E7F9F0 120deg 180deg,
        #FFF4CC 180deg 240deg,
        #EDE9FE 240deg 300deg,
        #FFE4E1 300deg 360deg
      );
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 22px solid #1e293b;
      margin-bottom: -10px;
    }

    button {
      margin-top: 25px;
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f5e6c8, #e8cfa0); /* 👈 ЗОЛОТО */
      color: #3b2f1c;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.96);
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }

    .info {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <h1>🎡 Крути колесо</h1>
  <div class="pointer"></div>

  <div id="wheel" class="wheel"></div>

  <button onclick="spin()">Крутить</button>

  <div id="result" class="result"></div>
  <div class="info">Каждый участник может крутить только один раз</div>

  <script>
    let spinning = false;

    const prizes = [
      "Скидка 5%",
      "Скидка 10%",
      "Бесплатная доставка",
      "Подарок",
      "Мини-набор",
      "Главный приз"
    ];

    function spin() {
      if (spinning) return;

      spinning = true;

      const wheel = document.getElementById("wheel");
      const result = document.getElementById("result");

      const randomIndex = Math.floor(Math.random() * prizes.length);
      const angle = 360 * 5 + (randomIndex * 60);

      wheel.style.transform = `rotate(${angle}deg)`;

      setTimeout(() => {
        result.innerText = "🎉 Ваш приз: " + prizes[randomIndex];
        spinning = false;
      }, 4000);
    }
  </script>

</body>
</html>
