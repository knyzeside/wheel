<script>
  const tg = window.Telegram?.WebApp;
  if (tg) tg.expand();

  let spinning = false;

  const prizes = [
    "Скидка 5%",
    "Скидка 10%",
    "Бесплатная доставка",
    "Подарок",
    "Мини-набор",
    "Главный приз"
  ];

  async function spin() {
    if (spinning) return;

    spinning = true;

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");
    const button = document.getElementById("spinBtn");

    result.innerText = "Крутим...";
    button.disabled = true;

    try {
      const userId = tg?.initDataUnsafe?.user?.id || "test-user";

      const response = await fetch("https://nathan-design-local-routines.trycloudflare.com/spin", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userId })
      });

      const data = await response.json();

      const prizeIndex = prizes.indexOf(data.prize);
      const safeIndex = prizeIndex >= 0 ? prizeIndex : 0;

      const angle = 360 * 5 + safeIndex * 60 + 30;
      wheel.style.transform = `rotate(-${angle}deg)`;

      setTimeout(() => {
        if (data.already) {
          result.innerText = `Вы уже крутили. Ваш приз: ${data.prize}`;
        } else {
          result.innerText = `🎁 Ваш приз: ${data.prize}`;
        }

        spinning = false;
        button.disabled = false;

        if (tg && typeof tg.sendData === "function") {
          tg.sendData(JSON.stringify({
            type: "wheel_result",
            prize: data.prize,
            already: data.already
          }));
        }
      }, 4200);

    } catch (error) {
      console.error(error);
      result.innerText = "Ошибка подключения к серверу";
      spinning = false;
      button.disabled = false;
    }
  }
</script>
