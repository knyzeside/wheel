<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Колесо удачи</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eeeeee;
      color: #1f2937;
      text-align: center;
    }

    h1 {
      margin-top: 28px;
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 26px solid #3f3f46;
      margin: 0 auto -6px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.12));
      position: relative;
      z-index: 2;
    }

    .wheel-wrap {
      position: relative;
      width: 320px;
      margin: 0 auto;
    }

    .wheel {
      width: 320px;
      height: 320px;
      margin: 0 auto;
      border-radius: 50%;
      border: 8px solid #ffffff;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.12),
        inset 0 0 30px rgba(255, 255, 255, 0.35);
      transition: transform 4.2s cubic-bezier(.17,.67,.12,.99);
      background: conic-gradient(
        #ead6d2 0deg 60deg,
        #d9e2ef 60deg 120deg,
        #d7e4dc 120deg 180deg,
        #efe2b8 180deg 240deg,
        #ddd8ec 240deg 300deg,
        #e7cfcf 300deg 360deg
      );
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 74px;
      height: 74px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: linear-gradient(145deg, #f8f5ef, #ece5d9);
      border: 4px solid #f5f1ea;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .spin-btn {
      margin-top: 26px;
      padding: 14px 30px;
      border: 1px solid #d6b97c;
      border-radius: 14px;
      background: linear-gradient(135deg, #f7e7c6, #e5c98f);
      color: #4b3b25;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(90, 70, 48, 0.14);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .spin-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(90, 70, 48, 0.18);
    }

    .spin-btn:active {
      transform: scale(0.98);
    }

    .spin-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .result {
      min-height: 28px;
      margin-top: 22px;
      font-size: 18px;
      font-weight: 600;
      color: #2f2a24;
      padding: 0 16px;
    }

    .info {
      margin-top: 14px;
      margin-bottom: 28px;
      font-size: 14px;
      color: #7c7c7c;
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <h1>🎡 Крути колесо</h1>

  <div class="pointer"></div>

  <div class="wheel-wrap">
    <div id="wheel" class="wheel"></div>
    <div class="wheel-center"></div>
  </div>

  <button id="spinBtn" class="spin-btn" onclick="spin()">Крутить</button>

  <div id="result" class="result"></div>
  <div class="info">Каждый участник может крутить колесо только один раз</div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    let spinning = false;

    const prizes = [
      "Скидка 5%",
      "Скидка 10%",
      "Бесплатная доставка",
      "Подарок",
      "Мини-набор",
      "Главный приз"
    ];

    async function spin() {
      if (spinning) return;

      spinning = true;

      const wheel = document.getElementById("wheel");
      const result = document.getElementById("result");
      const button = document.getElementById("spinBtn");

      result.innerText = "Крутим...";
      button.disabled = true;

      try {
        const userId = tg?.initDataUnsafe?.user?.id || "test-user";

        const response = await fetch("https://api.ederralabs.ru/spin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ userId })
        });

        if (!response.ok) {
          throw new Error("Server response error");
        }

        const data = await response.json();

        const prizeIndex = prizes.indexOf(data.prize);
        const safeIndex = prizeIndex >= 0 ? prizeIndex : 0;

        const angle = 360 * 5 + safeIndex * 60 + 30;
        wheel.style.transform = `rotate(-${angle}deg)`;

        setTimeout(() => {
          if (data.already) {
            result.innerText = `Вы уже крутили. Ваш приз: ${data.prize}`;
          } else {
            result.innerText = `🎁 Ваш приз: ${data.prize}`;
          }

          spinning = false;
          button.disabled = false;

          if (tg && typeof tg.sendData === "function") {
            tg.sendData(JSON.stringify({
              type: "wheel_result",
              prize: data.prize,
              already: data.already
            }));
          }
        }, 4200);

      } catch (error) {
        console.error(error);
        result.innerText = "Ошибка подключения к серверу";
        spinning = false;
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
